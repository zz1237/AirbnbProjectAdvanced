models:
  - name: dim_listings_clean
    description: Cleaned table which contains Airbnb listings data.
    data_tests:
      - min_row_count:
          arguments:
            min_row_cnt: 1000
          config:
            severity: error
    columns:
      - name: listing_id
        description: Unique identifier and primary key for each listing.
        data_tests:
          - not_null
          - unique

      - name: host_id
        description: The hosts' id, which refers to the host table.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_hosts_clean')
                field: host_id

      - name: room_type
        description: The type of room offered in the listing.
        data_tests:
          - accepted_values:
              arguments:
                values: ['Entire home/apt', 'Private room', 'Shared room', 'Hotel room']

                
      - name: minimum_nights
        description: '{{ doc("dim_listing_cleansed__minimum_nights") }}'
        data_tests:
          - positive_values

  - name: dim_hosts_clean
    description: Cleaned table which contains Airbnb hosts data.
    config:
      contract:
        enforced: true
    columns:
      - name: host_id
        description: id of the host and primary key for each host
        data_type: integer
      - name: host_name
        description: name of the host
        data_type: string
      - name: is_superhost
        description: whether the host is a superhost or not
        data_type: string
      - name: updated_at
        data_type: timestamp
      - name: created_at
        data_type: timestamp

  - name: dim_listing_w_hosts
    data_tests:
      - dbt_expectations.expect_table_row_count_to_equal_other_table:
          arguments:
            compare_model: source('airbnb', 'listings')
    columns:
      - name: price
        data_tests:
          - dbt_expectations.expect_column_quantile_values_to_be_between:
              arguments:
                quantile: .99
                min_value: 50 # (Optional)
                max_value: 500 # (Optional)
          - dbt_expectations.expect_column_max_to_be_between:
              arguments:
                max_value: 5000 # (Optional)
              config:
                severity: warn
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:  
                column_type: number